title: Clipper
title_separator: "|"
email: ""
repository: "ilayaraja97/clipper"
description: >-
  Clipper is an artificial intelligence powered terminal assistant. 
  Use it to prepare and execute any command lines from requests expressed in your natural language. 
  You can also engage in conversation with it about any topics you may think about.
  Unleash the power of AI with the comfort of staying at /home !
twitter_username: ""
github_username: ilayaraja97
minimal_mistakes_skin: dark
search: false
markdown: kramdown
remote_theme: mmistakes/minimal-mistakes

include:
  - _pages

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

author:
  name   : "ilayaraja97"
  avatar : ""
  bio    : "Maintainer of Clipper."
  links:
    - label: "Twitter"
      icon: "fab fa-fw fa-twitter-square"
      url: ""
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/ilayaraja97"

footer:
  links:
    - label: "Twitter"
      icon: "fab fa-fw fa-twitter-square"
      url: ""
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/ilayaraja97"

defaults:
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: splash
      author_profile: false
